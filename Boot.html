
<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BootPilot</title>
<style>
body{margin:0;background:#0d1b2a;color:#fff;font-family:-apple-system,sans-serif}
.wrap{max-width:520px;margin:auto;padding:18px}
.card{background:#1b263b;border-radius:18px;padding:16px;margin-bottom:14px}
h1{text-align:center} input{width:100%;padding:12px;font-size:18px;border-radius:10px;border:0;margin:6px 0}
button{width:100%;padding:14px;border:0;border-radius:12px;background:#00a86b;color:#fff;font-size:18px}
.big{font-size:42px;font-weight:700;text-align:center}
.small{text-align:center;color:#c8d3df}
table{width:100%;border-collapse:collapse}td,th{padding:6px;border-bottom:1px solid #445}
</style></head><body>
<div class="wrap">
<h1>🚤 BootPilot</h1>

<div class="card">
<div class="big" id="speed">0.0 km/h</div>
<div class="small">GPS-Geschwindigkeit</div>
<button onclick="track()">GPS starten</button>
</div>

<div class="card">
<label>Tankinhalt (l)</label><input id="fuel" type="number" value="25">
<label>Reserve (l)</label><input id="reserve" type="number" value="5">
<label>Ø Verbrauch (l/100 km)</label><input id="cons" type="number" value="5" step="0.1">
<button onclick="calc()">Reichweite berechnen</button>
<div class="big" id="range">400 km</div>
<div class="small" id="state">🟢 Alles ok</div>
</div>

<div class="card">
<h3>Fahrt speichern</h3>
<input id="km" type="number" placeholder="Gefahrene km">
<input id="lit" type="number" placeholder="Nachgetankt (l)">
<button onclick="saveTrip()">Speichern</button>
</div>

<div class="card">
<h3>Fahrtenbuch</h3>
<table id="log"><tr><th>Datum</th><th>km</th><th>l</th></tr></table>
</div>
</div>

<script>
function calc(){
let f=+fuel.value,r=+reserve.value,c=+cons.value;
let rr=Math.max(0,f-r)/c*100;
range.innerText=rr.toFixed(0)+" km";
state.innerText=rr<30?"🔴 Tanken":rr<60?"🟡 Bald tanken":"🟢 Alles ok";
localStorage.fuel=f;localStorage.cons=c;
}
function load(){
fuel.value=localStorage.fuel||25;
cons.value=localStorage.cons||5;
calc();
let arr=JSON.parse(localStorage.trips||"[]");
arr.forEach(addRow);
}
function addRow(t){
let tr=document.createElement("tr");
tr.innerHTML="<td>"+t.d+"</td><td>"+t.k+"</td><td>"+t.l+"</td>";
log.appendChild(tr);
}
function saveTrip(){
let t={d:new Date().toLocaleDateString(),k:km.value,l:lit.value};
let arr=JSON.parse(localStorage.trips||"[]");
arr.unshift(t);localStorage.trips=JSON.stringify(arr);
addRow(t);
km.value="";lit.value="";
}
function track(){
if(!navigator.geolocation){alert("GPS nicht verfügbar");return;}
navigator.geolocation.watchPosition(p=>{
let s=(p.coords.speed||0)*3.6;
speed.innerText=s.toFixed(1)+" km/h";
},{},{enableHighAccuracy:true});
}
load();
</script></body></html>
