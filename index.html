<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BootPilot</title><style>body{margin:0;background:#0b1f33;color:#fff;font-family:-apple-system,sans-serif}.wrap{max-width:520px;margin:auto;padding:16px}.card{background:#16324f;border-radius:16px;padding:16px;margin-bottom:14px}h1{text-align:center}.big{font-size:42px;text-align:center;font-weight:bold}input{width:100%;padding:12px;font-size:18px;border-radius:10px;border:none;margin:8px 0}button{width:100%;padding:14px;border:none;border-radius:12px;background:#1aa36f;color:#fff;font-size:18px}</style></head><body><div class="wrap"><h1>🚤 BootPilot</h1><div class="card"><div class="big" id="speed">0.0 km/h</div><div style="text-align:center">GPS</div><button onclick="gps()">GPS starten</button></div><div class="card"><input id="fuel" type="number" value="25"><input id="reserve" type="number" value="5"><input id="cons" type="number" value="5" step="0.1"><button onclick="calc()">Reichweite</button><div class="big" id="range"></div><div id="st" style="text-align:center;font-size:22px"></div></div></div><script>function calc(){let f=+fuel.value,r=+reserve.value,c=+cons.value;let km=Math.max(0,f-r)/c*100;range.innerText=km.toFixed(0)+" km";st.innerText=km<30?"🔴 Tanken":km<60?"🟡 Bald tanken":"🟢 Alles OK";localStorage.f=f;localStorage.c=c}function gps(){navigator.geolocation.watchPosition(p=>{speed.innerText=((p.coords.speed||0)*3.6).toFixed(1)+" km/h"},()=>alert("Standort erlauben"),{enableHighAccuracy:true})}window.onload=()=>{if(localStorage.f)fuel.value=localStorage.f;if(localStorage.c)cons.value=localStorage.c;calc()}</script></body></html>
