<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BootPilot v2</title>
<style>
body{margin:0;background:#101418;color:#fff;font-family:Arial,sans-serif}
.wrap{max-width:760px;margin:auto;padding:20px}
.card{background:#1b2128;border-radius:14px;padding:16px;margin:12px 0}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:0}
button{background:#0a84ff;color:#fff;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{font-size:1.4rem;font-weight:bold}
table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #333}
.warn{color:#ffb300;font-weight:bold}
</style>
</head>
<body><div class="wrap">
<h1>🚤 BootPilot v2</h1>
<div class="card">
<label>Tankkapazität (l)</label><input id="cap" type="number" value="25">
<label>Aktueller Tank (l)</label><input id="tank" type="number" value="25">
<label>Verbrauch (l/100 km)</label><input id="cons" type="number" value="8">
<label>Gefahrene Kilometer</label><input id="km" type="number">
<button onclick="saveTrip()">Fahrt speichern</button>
<button onclick="fillTank()">Tank voll</button>
</div>

<div class="card grid">
<div><div>Resttank</div><div id="left" class="stat">25.0 l</div></div>
<div><div>Reichweite</div><div id="range" class="stat">313 km</div></div>
</div>

<div class="card">
<div id="warning"></div>
<h3>Fahrtenbuch</h3>
<table><thead><tr><th>Datum</th><th>km</th><th>Liter</th></tr></thead><tbody id="rows"></tbody></table>
<button onclick="exportCSV()">CSV exportieren</button>
<button onclick="clearLog()">Fahrten löschen</button>
</div>

<script>
let trips=JSON.parse(localStorage.bp||"[]");
function updateDisplay(){
 const tank=+tankEl().value||0, cons=+consEl().value||1;
 left.textContent=tank.toFixed(1)+" l";
 range.textContent=Math.round(tank/cons*100)+" km";
 warning.textContent=tank<5?"⚠ Reserve erreicht":"";
 warning.className=tank<5?"warn":"";
 rows.innerHTML="";
 trips.forEach(t=>rows.innerHTML+=`<tr><td>${t.d}</td><td>${t.k}</td><td>${t.l.toFixed(2)}</td></tr>`);
}
const tankEl=()=>document.getElementById("tank");
const consEl=()=>document.getElementById("cons");
function saveTrip(){
 let km=+document.getElementById("km").value||0;
 let cons=+consEl().value||0;
 let used=km*cons/100;
 tankEl().value=Math.max(0,(+tankEl().value)-used).toFixed(2);
 trips.unshift({d:new Date().toLocaleString("de-DE"),k:km,l:used});
 localStorage.bp=JSON.stringify(trips);
 updateDisplay();
}
function fillTank(){tankEl().value=document.getElementById("cap").value;updateDisplay();}
function clearLog(){if(confirm("Alles löschen?")){trips=[];localStorage.removeItem("bp");updateDisplay();}}
function exportCSV(){
 let csv="Datum;km;Liter\n"+trips.map(t=>`${t.d};${t.k};${t.l.toFixed(2)}`).join("\n");
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
 a.download="bootpilot-fahrten.csv";a.click();
}
document.querySelectorAll("input").forEach(i=>i.oninput=updateDisplay);
updateDisplay();
</script></div></body></html>
